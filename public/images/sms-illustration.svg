<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" fill="none">
  <!-- Background circles -->
  <circle cx="420" cy="60" r="130" fill="rgba(255,255,255,0.05)"/>
  <circle cx="80" cy="380" r="100" fill="rgba(255,255,255,0.04)"/>
  <!-- Ground strip -->
  <rect x="20" y="330" width="460" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <!-- Road markings -->
  <rect x="60" y="332" width="30" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="120" y="332" width="30" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="180" y="332" width="30" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="240" y="332" width="30" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Crane mast -->
  <rect x="310" y="100" width="14" height="232" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Crane arm -->
  <rect x="310" y="100" width="140" height="11" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Crane cable -->
  <rect x="440" y="111" width="5" height="90" rx="2" fill="rgba(255,255,255,0.22)"/>
  <!-- Magnet -->
  <ellipse cx="442" cy="210" rx="24" ry="12" fill="rgba(255,255,255,0.35)"/>
  <path d="M422 204 Q442 222 462 204" stroke="rgba(255,255,255,0.5)" stroke-width="3.5" fill="none"/>
  <circle cx="442" cy="210" r="5" fill="rgba(255,255,255,0.6)"/>

  <!-- Car body (main, being scrapped) -->
  <rect x="60" y="260" width="170" height="68" rx="12" fill="rgba(255,255,255,0.16)"/>
  <rect x="82" y="238" width="126" height="34" rx="9" fill="rgba(255,255,255,0.2)"/>
  <!-- Windows -->
  <rect x="90" y="243" width="48" height="24" rx="5" fill="rgba(255,255,255,0.32)"/>
  <rect x="145" y="243" width="48" height="24" rx="5" fill="rgba(255,255,255,0.32)"/>
  <!-- Headlights -->
  <rect x="63" y="273" width="18" height="12" rx="4" fill="rgba(255,255,220,0.5)"/>
  <rect x="209" y="273" width="18" height="12" rx="4" fill="rgba(255,200,100,0.4)"/>
  <!-- Wheels -->
  <circle cx="100" cy="332" r="17" fill="rgba(255,255,255,0.2)"/>
  <circle cx="100" cy="332" r="9"  fill="rgba(255,255,255,0.35)"/>
  <circle cx="192" cy="332" r="17" fill="rgba(255,255,255,0.2)"/>
  <circle cx="192" cy="332" r="9"  fill="rgba(255,255,255,0.35)"/>

  <!-- Stacked crushed car #2 -->
  <rect x="64" y="210" width="162" height="46" rx="8" fill="rgba(255,255,255,0.11)"/>
  <rect x="80" y="196" width="120" height="22" rx="6" fill="rgba(255,255,255,0.13)"/>

  <!-- Scrap pile right side -->
  <ellipse cx="390" cy="326" rx="72" ry="22" fill="rgba(255,255,255,0.1)"/>
  <rect x="345" y="278" width="32" height="48" rx="5" fill="rgba(255,255,255,0.14)" transform="rotate(-7 345 278)"/>
  <rect x="374" y="265" width="26" height="60" rx="5" fill="rgba(255,255,255,0.11)" transform="rotate(4 374 265)"/>
  <rect x="400" y="282" width="30" height="44" rx="5" fill="rgba(255,255,255,0.17)" transform="rotate(-2 400 282)"/>
  <rect x="425" y="290" width="22" height="36" rx="4" fill="rgba(255,255,255,0.13)" transform="rotate(6 425 290)"/>

  <!-- Central recycle emblem -->
  <circle cx="235" cy="150" r="62" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="211" y="164" font-family="Arial" font-size="44" fill="rgba(255,255,255,0.75)">♻</text>

  <!-- Stat card 1 -->
  <rect x="20" y="60" width="118" height="72" rx="12" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="38" cy="82" r="7" fill="rgba(100,255,160,0.7)"/>
  <text x="50" y="88" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.6)">Today</text>
  <text x="30" y="114" font-family="Arial" font-size="26" font-weight="800" fill="rgba(255,255,255,0.92)">247</text>
  <text x="30" y="128" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.5)">Vehicles</text>

  <!-- Stat card 2 -->
  <rect x="362" y="148" width="118" height="72" rx="12" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="380" cy="170" r="7" fill="rgba(100,200,255,0.7)"/>
  <text x="392" y="176" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.6)">Revenue</text>
  <text x="370" y="202" font-family="Arial" font-size="22" font-weight="800" fill="rgba(255,255,255,0.92)">₹4.2L</text>
  <text x="370" y="216" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.5)">This Month</text>

  <!-- Badge row -->
  <rect x="20" y="160" width="108" height="30" rx="15" fill="rgba(100,255,160,0.18)" stroke="rgba(100,255,160,0.4)" stroke-width="1"/>
  <text x="36" y="179" font-family="Arial" font-size="11" font-weight="600" fill="rgba(200,255,220,0.9)">✓ MoRTH Ready</text>

  <rect x="20" y="198" width="96" height="30" rx="15" fill="rgba(255,220,80,0.18)" stroke="rgba(255,220,80,0.35)" stroke-width="1"/>
  <text x="36" y="218" font-family="Arial" font-size="11" font-weight="600" fill="rgba(255,240,160,0.9)">⚡ VAHAN Sync</text>

  <!-- Bottom tag -->
  <text x="250" y="395" text-anchor="middle" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.38)">India's Smart Vehicle Scrappage Platform</text>
</svg>
