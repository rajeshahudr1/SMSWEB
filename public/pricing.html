<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Choose Your Plan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f4f6fb;min-height:100vh;}
.hero{text-align:center;padding:40px 20px 12px;}
.hero h1{font-size:2rem;font-weight:800;color:#1e293b;}
.hero p{font-size:.9rem;color:#64748b;margin-top:6px;}
.toggle{display:flex;justify-content:center;margin:18px 0 26px;}
.toggle-box{display:inline-flex;background:#fff;border:2px solid #e2e8f0;border-radius:30px;padding:3px;gap:2px;}
.toggle-box button{border:none;background:none;padding:8px 22px;border-radius:28px;font-size:12px;font-weight:700;cursor:pointer;color:#94a3b8;}
.toggle-box button.on{background:#1e293b;color:#fff;}
.toggle-box .sv{background:#dcfce7;color:#16a34a;font-size:8px;padding:2px 5px;border-radius:5px;margin-left:3px;font-weight:800;}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:18px;max-width:1100px;margin:0 auto;padding:0 16px 40px;}
.card{background:#fff;border:2px solid #e8ecf1;border-radius:14px;padding:24px 20px;width:320px;display:flex;flex-direction:column;position:relative;transition:.25s;}
.card:hover{box-shadow:0 8px 28px rgba(0,0,0,.07);transform:translateY(-3px);}
.card.hi{border-color:#3b82f6;box-shadow:0 4px 20px rgba(59,130,246,.1);}
.bdg{position:absolute;top:-10px;left:50%;transform:translateX(-50%);padding:3px 12px;border-radius:12px;font-size:9px;font-weight:800;letter-spacing:.6px;color:#fff;}
.bdg-most_popular{background:#3b82f6;}.bdg-recommended{background:#8b5cf6;}.bdg-best_value{background:#16a34a;}.bdg-new{background:#f59e0b;}.bdg-enterprise{background:#1e293b;}.bdg-trial{background:#ec4899;}.bdg-custom{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.tri{position:absolute;top:10px;right:10px;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:6px;font-size:8px;font-weight:700;}
.nm{font-size:18px;font-weight:800;color:#1e293b;margin:4px 0 3px;}
.ds{font-size:11px;color:#64748b;margin-bottom:10px;line-height:1.4;}
.pb{margin-bottom:10px;}
.pr{font-size:34px;font-weight:900;color:#1e293b;line-height:1;}.pr .c{font-size:14px;vertical-align:super;color:#64748b;}.pr .p{font-size:11px;font-weight:400;color:#94a3b8;}
.fr{font-size:30px;font-weight:900;color:#16a34a;}
.sv2{font-size:9px;color:#16a34a;font-weight:700;margin-top:2px;}
.nt{font-size:9px;color:#94a3b8;margin-top:1px;}
.btn{width:100%;padding:10px;font-size:12px;font-weight:700;border-radius:8px;border:none;cursor:pointer;margin-bottom:14px;}
.btn-b{background:#3b82f6;color:#fff;}.btn-d{background:#1e293b;color:#fff;}.btn-o{background:#fff;border:2px solid #e2e8f0;color:#1e293b;}
.fl{list-style:none;padding:0;flex:1;}
.fl li{padding:4px 0;font-size:11px;color:#475569;display:flex;align-items:center;gap:6px;}
.fl li i{color:#16a34a;font-size:10px;}
.vl{display:block;text-align:center;margin-top:6px;color:#3b82f6;font-size:10px;font-weight:600;text-decoration:none;cursor:pointer;}
.foot{text-align:center;padding:18px;color:#94a3b8;font-size:10px;border-top:1px solid #e2e8f0;}.foot a{color:#3b82f6;text-decoration:none;}

/* Popup */
.overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.5);overflow-y:auto;padding:20px;}
.popup{max-width:920px;width:96%;margin:20px auto;background:#fff;border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.2);position:relative;animation:popIn .3s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.popup .x{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:#f1f5f9;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;z-index:1;}.popup .x:hover{background:#e2e8f0;color:#1e293b;}
.popup-hd{text-align:center;padding:32px 28px 20px;border-bottom:1px solid #f1f5f9;}
.popup-hd .nm{font-size:28px;}
.popup-hd .ds{font-size:14px!important;margin-top:6px!important;}
.popup-hd .pr{font-size:36px!important;}
.popup-hd .fr{font-size:32px!important;}
.popup-cols{display:grid;grid-template-columns:1fr 1fr;}
.popup-col{padding:24px 28px;}.popup-col:nth-child(2){border-left:1px solid #f1f5f9;}
.sh{font-size:14px;font-weight:800;color:#1e293b;margin-bottom:6px;display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:1px solid #f8fafc;}.sh i{color:#16a34a;font-size:12px;}
.mr{display:flex;align-items:center;padding:5px 0 5px 22px;font-size:13px;}.mr .n{flex:1;color:#475569;}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;}
.tg{background:#dcfce7;color:#16a34a;}.ty{background:#fef3c7;color:#92400e;}.tgr{background:#f1f5f9;color:#94a3b8;}
.popup-ft{text-align:center;padding:18px 28px 28px;border-top:1px solid #f1f5f9;}
@media(max-width:600px){.cards{flex-direction:column;align-items:center;}.card{width:100%;max-width:340px;}.popup-cols{grid-template-columns:1fr;}.popup-col:nth-child(2){border-left:none;border-top:1px solid #f1f5f9;}}
</style>
</head>
<body>
<div class="hero"><h1>Choose Your Plan</h1><p>Simple pricing. No hidden fees. Upgrade anytime.</p></div>
<div class="toggle"><div class="toggle-box"><button class="on" id="bm" onclick="sw('m')">Monthly</button><button id="by" onclick="sw('y')">Yearly <span class="sv">SAVE</span></button></div></div>
<div class="cards" id="cards"></div>
<div class="overlay" id="ov" onclick="if(event.target===this)cl()"><div class="popup"><button class="x" onclick="cl()"><i class="bi bi-x"></i></button><div id="pb"></div></div></div>
<!-- Enquiry Modal -->
<div class="overlay" id="eov" onclick="if(event.target===this)closeEnq()">
  <div class="popup" style="max-width:500px;">
    <button class="x" onclick="closeEnq()"><i class="bi bi-x"></i></button>
    <div style="padding:28px;">
      <h3 style="font-size:20px;font-weight:800;margin-bottom:4px;" id="eqTitle">Get a Custom Quote</h3>
      <p style="font-size:12px;color:#64748b;margin-bottom:20px;" id="eqDesc">Fill in your details and our team will get back to you within 24 hours.</p>
      <form id="eqForm">
        <input type="hidden" id="eqPkgId" value=""/>
        <div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">Name *</label><input type="text" id="eqName" required style="width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;" placeholder="Your full name"/></div>
        <div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">Email *</label><input type="email" id="eqEmail" required style="width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;" placeholder="you@company.com"/></div>
        <div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">Phone</label><input type="tel" id="eqPhone" style="width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;" placeholder="+1 234 567 890"/></div>
        <div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">Company Name</label><input type="text" id="eqCompany" style="width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;" placeholder="Your company"/></div>
        <div style="margin-bottom:16px;"><label style="font-size:11px;font-weight:600;color:#475569;display:block;margin-bottom:4px;">Message</label><textarea id="eqMsg" rows="3" style="width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;resize:vertical;" placeholder="Tell us about your requirements..."></textarea></div>
        <button type="submit" id="eqBtn" class="btn btn-b" style="width:100%;padding:12px;font-size:14px;">Send Enquiry</button>
      </form>
      <div id="eqSuccess" style="display:none;text-align:center;padding:20px 0;">
        <div style="font-size:48px;margin-bottom:12px;">✅</div>
        <h4 style="font-size:18px;font-weight:700;color:#16a34a;">Enquiry Sent!</h4>
        <p style="font-size:13px;color:#64748b;margin-top:6px;">We'll get back to you within 24 hours. Check your email for confirmation.</p>
      </div>
    </div>
  </div>
</div>
<div class="foot">Already have an account? <a href="/login">Sign in</a> · © <script>document.write(new Date().getFullYear())</script> SMS</div>
<script>
var B='m',D=[],U=location.origin.replace(':3001',':3000');
var BN={most_popular:'MOST POPULAR',recommended:'RECOMMENDED',best_value:'BEST VALUE','new':'NEW',enterprise:'ENTERPRISE',trial:'TRIAL',custom:'CUSTOM'};
function sw(t){B=t;document.getElementById('bm').className=t==='m'?'on':'';document.getElementById('by').className=t==='y'?'on':'';go();}
function $(s){return document.getElementById(s);}
function E(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function F(v){return parseFloat(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function Y(p){var m=p.price||0,d=p.yearly_discount_pct||0;return m>0?Math.round(m*12*(1-d/100)*100)/100:0;}

function go(){
  var el=$('cards');if(!D.length){el.innerHTML='<p style="color:#94a3b8;padding:40px;">No plans</p>';return;}
  var h='';
  D.forEach(function(p,i){
    var pr=B==='y'?Y(p):(p.price||0),z=pr<=0,dc=p.yearly_discount_pct||0;
    h+='<div class="card'+(p.badge?' hi':'')+'">';
    if(p.badge&&BN[p.badge])h+='<div class="bdg bdg-'+p.badge+'">'+BN[p.badge]+'</div>';
    if(p.is_trial&&!p.is_custom)h+='<div class="tri"><i class="bi bi-clock"></i> '+p.trial_days+'d trial</div>';
    h+='<div class="nm">'+E(p.name)+'</div><div class="ds">'+(p.description?E(p.description):'')+'</div>';
    if(p.is_custom){
      // Custom plan — no price, just description + contact us
      h+='<div class="pb"><div style="font-size:28px;font-weight:800;color:#6366f1;">Custom</div><div style="font-size:11px;color:#64748b;margin-top:4px;">Tailored to your needs</div></div>';
      h+='<button class="btn btn-b" onclick="openEnquiry('+i+')"><i class="bi bi-envelope" style="margin-right:4px;"></i>Contact Us</button>';
    } else {
      h+='<div class="pb">';
      if(z)h+='<div class="fr">Free</div>';
      else{h+='<div class="pr"><span class="c">€</span>'+F(pr)+'<span class="p">/'+(B==='y'?'yr':'mo')+'</span></div>';if(B==='y'&&dc>0)h+='<div class="sv2">Save '+dc+'%</div><div class="nt">€'+F(p.price)+'/mo billed yearly</div>';}
      h+='</div>';
      h+='<button class="btn '+(p.badge?'btn-b':(z?'btn-o':'btn-d'))+'" onclick="location.href=\'/register\'">'+(p.is_trial?'Start Free Trial':(z?'Get Started Free':'Get Started'))+'</button>';
    }
    var ft=p.features||[];if(ft.length){h+='<ul class="fl">';ft.slice(0,5).forEach(function(f){h+='<li><i class="bi bi-check-circle-fill"></i>'+E(f.split(' — ')[0])+'</li>';});h+='</ul>';}
    var sc=p.settings_config||[],fh=p.feature_headers||{};if(sc.length){h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;"><div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">'+(fh['Settings']||'Settings')+'</div><div style="display:flex;flex-wrap:wrap;gap:4px;">';sc.forEach(function(s){var ic={settings_custom_design:'bi-palette',settings_ai_config:'bi-robot',settings_localization:'bi-globe',settings_tax_config:'bi-receipt',settings_vehicle_columns:'bi-truck',settings_part_columns:'bi-boxes'};var lbl=fh['_mod_'+s.key]||s.label;h+='<span style="font-size:9px;background:#f1f5f9;color:#475569;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;"><i class="bi '+(ic[s.key]||'bi-gear')+'" style="font-size:8px;"></i>'+E(lbl)+'</span>';});h+='</div></div>';}
    h+='<a class="vl" onclick="op('+i+')">View all features →</a></div>';
  });
  el.innerHTML=h;
}

function op(i){
  var p=D[i];if(!p)return;
  var pr=B==='y'?Y(p):(p.price||0),z=pr<=0,dc=p.yearly_discount_pct||0;
  var ft=p.features||[],fh=p.feature_headers||{},sc=p.settings_config||[];
  var icMap={settings_custom_design:'bi-palette',settings_ai_config:'bi-robot',settings_localization:'bi-globe',settings_tax_config:'bi-receipt',settings_vehicle_columns:'bi-truck',settings_part_columns:'bi-boxes'};

  // Header
  var h='<div style="padding:28px 32px 20px;border-bottom:1px solid #f1f5f9;position:relative;">';
  if(p.badge&&BN[p.badge])h+='<div class="bdg bdg-'+p.badge+'" style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);">'+BN[p.badge]+'</div>';
  h+='<div style="display:flex;align-items:baseline;justify-content:center;gap:12px;flex-wrap:wrap;">';
  h+='<span style="font-size:26px;font-weight:800;color:#1e293b;">'+E(p.name)+'</span>';
  if(p.is_custom)h+='<span style="font-size:22px;font-weight:800;color:#6366f1;">Custom</span>';
  else if(z)h+='<span style="font-size:26px;font-weight:900;color:#16a34a;">Free</span>';
  else h+='<span style="font-size:26px;font-weight:900;color:#1e293b;"><span style="font-size:14px;color:#64748b;">€</span>'+F(pr)+'<span style="font-size:13px;font-weight:400;color:#94a3b8;">/'+(B==='y'?'yr':'mo')+'</span></span>';
  h+='</div>';
  if(p.description)h+='<div style="text-align:center;color:#64748b;font-size:14px;margin-top:6px;">'+E(p.description)+'</div>';
  if(!p.is_custom&&!z&&B==='y'&&dc>0)h+='<div style="text-align:center;margin-top:4px;"><span style="font-size:11px;color:#16a34a;font-weight:700;">Save '+dc+'% vs monthly</span></div>';
  if(p.is_trial&&!p.is_custom)h+='<div style="text-align:center;margin-top:6px;"><span style="background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;"><i class="bi bi-clock" style="margin-right:3px;"></i>'+p.trial_days+' Day Free Trial</span></div>';
  h+='</div>';

  // Features
  if(p.is_custom&&ft.length){
    // Custom plan: simple bullet list
    h+='<div style="padding:20px 24px;"><ul style="list-style:none;padding:0;margin:0;">';
    ft.forEach(function(f){h+='<li style="padding:6px 0;font-size:13px;color:#475569;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f1f5f9;"><i class="bi bi-check-circle-fill" style="color:#16a34a;font-size:12px;"></i>'+E(f)+'</li>';});
    h+='</ul></div>';
  } else if(ft.length){
    h+='<div style="padding:20px 24px;display:flex;flex-wrap:wrap;gap:12px;">';
    ft.forEach(function(f){
      var ps=f.split(' — '),hd=ps[0],ms=ps[1]?ps[1].split(', '):[];
      h+='<div style="flex:1 1 calc(50% - 6px);min-width:260px;background:#f8fafc;border:1px solid #e8ecf1;border-radius:10px;padding:14px 16px;">';
      h+='<div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:8px;display:flex;align-items:center;gap:6px;"><i class="bi bi-check-circle-fill" style="color:#16a34a;font-size:11px;"></i>'+E(hd)+'</div>';
      var sn={};ms.forEach(function(m){
        var mp=m.split(': '),nm=mp[0].trim();if(sn[nm])return;sn[nm]=1;
        var v=mp[1]?mp[1].trim():'Included';
        var cls=v==='Unlimited'?'tg':(v==='Included'?'tgr':'ty');
        h+='<div style="display:flex;align-items:center;padding:3px 0;"><span style="flex:1;font-size:12px;color:#475569;">'+E(nm)+'</span><span class="tag '+cls+'" style="font-size:9px;padding:2px 7px;">'+E(v)+'</span></div>';
      });
      h+='</div>';
    });
    h+='</div>';
  }

  // Settings section
  if(sc.length){
    h+='<div style="padding:16px 24px;border-top:1px solid #f1f5f9;background:#fafbfc;">';
    h+='<div style="font-size:13px;font-weight:800;color:#1e293b;margin-bottom:10px;"><i class="bi bi-gear" style="margin-right:6px;color:#3b82f6;"></i>'+(fh['Settings']||'Settings Included')+'</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px;">';
    sc.forEach(function(s){
      var lbl=fh['_mod_'+s.key]||s.label;
      h+='<div style="display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px 14px;">';
      h+='<i class="bi '+(icMap[s.key]||'bi-gear')+'" style="color:#3b82f6;font-size:15px;"></i>';
      h+='<span style="font-size:13px;font-weight:600;color:#334155;">'+E(lbl)+'</span>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // CTA
  h+='<div style="text-align:center;padding:20px 24px 28px;border-top:1px solid #f1f5f9;">';
  if(p.is_custom) h+='<button class="btn btn-b" style="max-width:260px;margin:0 auto;padding:12px;font-size:14px;" onclick="cl();openEnquiry('+D.indexOf(p)+');"><i class="bi bi-envelope" style="margin-right:4px;"></i>Contact Us</button>';
  else h+='<button class="btn '+(p.badge?'btn-b':(z?'btn-o':'btn-d'))+'" style="max-width:260px;margin:0 auto;padding:12px;font-size:14px;" onclick="location.href=\'/register\'">'+(p.is_trial?'Start Free Trial':(z?'Get Started Free':'Get Started'))+'</button>';
  h+='</div>';
  $('pb').innerHTML=h;$('ov').style.display='block';document.body.style.overflow='hidden';
}
function cl(){$('ov').style.display='none';document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});

// Enquiry form
function openEnquiry(i){
  var p=D[i];if(!p)return;
  document.getElementById('eqTitle').textContent='Get a Quote — '+p.name;
  document.getElementById('eqPkgId').value=p.id||'';
  document.getElementById('eqForm').style.display='';
  document.getElementById('eqSuccess').style.display='none';
  document.getElementById('eov').style.display='block';
  document.body.style.overflow='hidden';
}
function closeEnq(){document.getElementById('eov').style.display='none';document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeEnq();cl();}});
document.getElementById('eqForm').addEventListener('submit',function(e){
  e.preventDefault();
  var btn=document.getElementById('eqBtn');
  btn.textContent='Sending...';btn.disabled=true;
  fetch(U+'/api/public/package-enquiry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    package_id:document.getElementById('eqPkgId').value,
    name:document.getElementById('eqName').value,
    email:document.getElementById('eqEmail').value,
    phone:document.getElementById('eqPhone').value,
    company_name:document.getElementById('eqCompany').value,
    message:document.getElementById('eqMsg').value
  })}).then(function(r){return r.json();}).then(function(r){
    btn.textContent='Send Enquiry';btn.disabled=false;
    if(r.status===201||r.status===200){
      document.getElementById('eqForm').style.display='none';
      document.getElementById('eqSuccess').style.display='';
    }else{alert(r.message||'Failed to send. Please try again.');}
  }).catch(function(){btn.textContent='Send Enquiry';btn.disabled=false;alert('Network error.');});
});

fetch(U+'/api/public/packages').then(function(r){return r.json();}).then(function(r){if(r.status===200&&r.data){var d=r.data;D=d.packages||d;go();}});
</script>
</body>
</html>
